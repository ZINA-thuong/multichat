<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e6eff9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Màn hình nhập tên (Overlay) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0078d4, #00bcf2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: all 0.5s ease; }
        #login-overlay h2 { color: white; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        #nameInput { padding: 12px 20px; border-radius: 25px; border: none; width: 280px; text-align: center; font-size: 16px; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #btnJoin { margin-top: 20px; padding: 12px 50px; background: white; color: #0078d4; border: none; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        #btnJoin:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Khung chat chính */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        
        /* Bong bóng tin nhắn */
        .bubble { max-width: 75%; margin-bottom: 8px; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; line-height: 1.4; }
        .bubble .time { font-size: 10px; color: rgba(0,0,0,0.4); margin-top: 4px; display: block; text-align: right; }
        .bubble .sender { font-weight: bold; font-size: 11px; margin-bottom: 3px; display: block; }

        .left { align-self: flex-start; background-color: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .left .sender { color: #0078d4; }
        
        .right { align-self: flex-end; background-color: #0078d4; color: white; border-bottom-right-radius: 4px; box-shadow: 0 2px 5px rgba(0,120,212,0.3); }
        .right .time { color: rgba(255,255,255,0.7); }

        /* Thông báo hệ thống */
        .system-msg { text-align: center; color: #5c7c99; font-size: 11px; margin: 15px 0; font-style: italic; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 10px; align-self: center; width: fit-content; }

        /* Thanh nhập liệu phía dưới */
        #input-area { background-color: white; padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #d1d9e0; }
        #msgInput { flex: 1; border: 1px solid #ced4da; border-radius: 25px; padding: 12px 20px; outline: none; font-size: 14px; transition: 0.2s; }
        #msgInput:focus { border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,0.1); }
        #btnSend { background-color: #0078d4; border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #btnSend:hover { background-color: #005a9e; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Sky Chat Cloud</h2>
        <input type="text" id="nameInput" placeholder="Tên hiển thị của bạn..." maxlength="15" onkeydown="if(event.key==='Enter') joinChat()">
        <button id="btnJoin" onclick="joinChat()">Bắt đầu Chat</button>
    </div>

    <div id="chat-box">
        </div>
    
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter') sendToBridge()">
        <button id="btnSend" onclick="sendToBridge()">Gửi</button>
    </div>

    <script>
        // Gọi khi nhấn nút "Bắt đầu"
        function joinChat() {
            const name = document.getElementById('nameInput').value.trim();
            if (name !== "") {
                // Gọi sang Java: ChatController.setUserAndJoin(name)
                window.javaApp.setUserAndJoin(name);
                
                // Hiệu ứng biến mất màn hình đăng nhập
                const overlay = document.getElementById('login-overlay');
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                
                document.getElementById('msgInput').focus();
            }
        }

        // Java gọi hàm này để thêm tin nhắn chat
        function addMessageToHTML(sender, content, time, isMe) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'right' : 'left'}`;
            
            let html = "";
            if(!isMe) html += `<span class="sender">${sender}</span>`;
            html += `<span>${content}</span><span class="time">${time}</span>`;
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            
            // Tự động cuộn xuống dưới cùng
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Java gọi hàm này để hiển thị thông báo JOIN/LEAVE
        function addSystemMessage(content) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Gọi sang Java khi nhấn nút "Gửi"
        function sendToBridge() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (text !== "") {
                window.javaApp.sendFromHTML(text); // Gọi sang ChatController.sendFromHTML(text)
                input.value = "";
                input.focus();
            }
        }
    </script>
</body>
</html>
